name: Build and Publish Wheels

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: Build Wheels on ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022, macos-15, ubuntu-24.04, ubuntu-24.04-arm]
        include:
          - os: windows-2022
            archs: [AMD64]
          - os: macos-15
            archs: [universal2]
          - os: ubuntu-24.04
            archs: [x86_64]
          - os: ubuntu-24.04-arm
            archs: [aarch64]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build Wheels
        uses: pypa/cibuildwheel@main
        env:
          CIBW_ARCHS_LINUX: ${{ contains(matrix.os, 'ubuntu') && join(matrix.archs, ' ') || 'x86_64' }}
          CIBW_ARCHS_WINDOWS: ${{ contains(matrix.os, 'windows') && join(matrix.archs, ' ') || 'AMD64' }}
          CIBW_ARCHS_MACOS: ${{ (contains(matrix.os, 'macos') && join(matrix.archs, ' ')) || 'x86_64' }}
          CIBW_BUILD_FRONTEND: build[uv]
          CIBW_TEST_SKIP: "*-win_arm64"
          CIBW_SKIP: pp* *-musllinux* cp313t-* cp314t-*  # PyPI のストレージ容量節約のため free-threaded 版を省略
          CIBW_PROJECT_REQUIRES_PYTHON: ">=3.9"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ join(matrix.archs, '-') }}
          path: ./wheelhouse
          retention-days: 5

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          retention-days: 5

  publish-wheels:
    name: Publish Wheels
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: ./wheelhouse

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ !startsWith(github.ref, 'refs/tags') }}
        continue-on-error: true
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: ./wheelhouse
          skip-existing: true
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        if: ${{ startsWith(github.ref, 'refs/tags') }}
        with:
          packages-dir: ./wheelhouse
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}
