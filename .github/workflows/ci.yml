# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.9'
            test-marine: false  # marine-plus は Python 3.10 以上のみ対応
          - os: ubuntu-latest
            python-version: '3.10'
            test-marine: true
          - os: ubuntu-latest
            python-version: '3.11'
            test-marine: true
          - os: ubuntu-latest
            python-version: '3.12'
            test-marine: true
          - os: ubuntu-latest
            python-version: '3.13'
            test-marine: true
          - os: ubuntu-latest
            python-version: '3.14'
            test-marine: true
            allow-failure: true  # SudachiPy が Python 3.14 未対応 (PyO3 のバージョン制約)
          - os: macos-latest
            python-version: '3.9'
            test-marine: false  # marine-plus は Python 3.10 以上のみ対応
          - os: macos-latest
            python-version: '3.10'
            test-marine: true
          - os: macos-latest
            python-version: '3.11'
            test-marine: true
          - os: macos-latest
            python-version: '3.12'
            test-marine: true
          - os: macos-latest
            python-version: '3.13'
            test-marine: true
          - os: macos-latest
            python-version: '3.14'
            test-marine: true
            allow-failure: true  # SudachiPy が Python 3.14 未対応 (PyO3 のバージョン制約)
          - os: windows-latest
            python-version: '3.9'
            test-marine: false  # marine-plus は Python 3.10 以上のみ対応
          - os: windows-latest
            python-version: '3.10'
            test-marine: true
          - os: windows-latest
            python-version: '3.11'
            test-marine: true
          - os: windows-latest
            python-version: '3.12'
            test-marine: true
          - os: windows-latest
            python-version: '3.13'
            test-marine: true
          - os: windows-latest
            python-version: '3.14'
            test-marine: true
            allow-failure: true  # SudachiPy が Python 3.14 未対応 (PyO3 のバージョン制約)

    continue-on-error: ${{ matrix.allow-failure || false }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      if: ${{ matrix.test-marine }}
      run: |
        uv sync --group dev --extra onnxruntime --extra marine
    - name: Install dependencies without marine
      if: ${{ !matrix.test-marine }}
      run: |
        uv sync --group dev --extra onnxruntime
    - name: Check dependency resolution
      run: |
        uv pip check
    - name: Lint with Ruff
      id: lint_ruff
      continue-on-error: true
      run: |
        uv run ruff check --fix .
    - name: Type check with Pyright
      id: lint_pyright
      continue-on-error: true
      run: |
        uv run pyright
    - name: Fail if lint or type check failed
      if: ${{ steps.lint_ruff.outcome == 'failure' || steps.lint_pyright.outcome == 'failure' }}
      run: |
        exit 1
    - name: Test g2p
      run: |
        uv run python -X utf8 -m pyopenjtalk "あらゆる現実を、すべて自分のほうへねじ曲げたのだ。"
    - name: Test with pytest
      run: |
        uv run task test
